<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" width="80" height="80">
  <!-- Background circle -->
  <circle cx="40" cy="40" r="40" fill="#0F172A"/>

  <!-- Android body -->
  <rect x="20" y="32" width="40" height="28" rx="8" fill="#3B82F6"/>

  <!-- Android head -->
  <rect x="24" y="18" width="32" height="20" rx="10" fill="#3B82F6"/>

  <!-- Eyes -->
  <circle cx="32" cy="27" r="3" fill="#0F172A"/>
  <circle cx="48" cy="27" r="3" fill="#0F172A"/>

  <!-- Antennas -->
  <line x1="30" y1="18" x2="26" y2="10" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="25" cy="9" r="2" fill="#60A5FA"/>
  <line x1="50" y1="18" x2="54" y2="10" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="55" cy="9" r="2" fill="#60A5FA"/>

  <!-- Arms -->
  <rect x="10" y="34" width="10" height="18" rx="5" fill="#3B82F6"/>
  <rect x="60" y="34" width="10" height="18" rx="5" fill="#3B82F6"/>

  <!-- Legs -->
  <rect x="24" y="58" width="12" height="14" rx="6" fill="#3B82F6"/>
  <rect x="44" y="58" width="12" height="14" rx="6" fill="#3B82F6"/>

  <!-- Root symbol on body (hashtag / root icon) -->
  <text x="40" y="50" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">#root</text>
</svg>
